<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Stream Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 1400px;
        width: 100%;
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
      }

      .back-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 25px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-radius: 10px;
        font-size: 1em;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }

      .back-btn:hover {
        background: rgba(255, 255, 255, 0.35);
      }

      .status {
        display: inline-block;
        padding: 8px 20px;
        border-radius: 20px;
        font-weight: bold;
        margin-top: 10px;
      }

      .status.waiting {
        background: #fbbf24;
        color: #78350f;
      }

      .status.streaming {
        background: #10b981;
        color: white;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      .content {
        padding: 30px;
      }

      .video-section {
        background: #1f2937;
        border-radius: 15px;
        overflow: hidden;
        position: relative;
        aspect-ratio: 16/9;
        max-width: 100%;
        margin: 0 auto;
      }

      #gameFrame {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #111827;
      }

      .placeholder {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #9ca3af;
      }

      .placeholder-icon {
        font-size: 4em;
        margin-bottom: 20px;
      }

      .fps-indicator {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #10b981;
        padding: 8px 15px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 0.9em;
      }

      @media (max-width: 768px) {
        .content {
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🎮 Game Stream Viewer</h1>
        <div class="status waiting" id="status">⏳ Waiting for stream...</div>
        <a href="active-streams.html" class="back-btn"
          >⬅ Return to Stream List</a
        >
      </div>

      <div class="content">
        <div class="video-section">
          <img id="gameFrame" style="display: none" alt="Game Stream" />
          <div class="placeholder" id="placeholder">
            <div class="placeholder-icon">📺</div>
            <p>Waiting for game stream to start...</p>
            <p style="font-size: 0.9em; margin-top: 10px">
              Start streaming from Unity to see the game here
            </p>
          </div>
          <div class="fps-indicator" id="fpsIndicator" style="display: none">
            0 FPS
          </div>
        </div>
      </div>
    </div>

    <script>
      let frameCount = 0;
      let sessionStartTime = null;
      let lastFrameTime = Date.now();
      let fpsCounter = 0;
      let fpsInterval = null;

      // Connect to server via polling (in production, use WebSockets)
      function connectToStream() {
        // Poll for latest frame every 33ms (~30 FPS max)
        setInterval(fetchLatestFrame, 33);

        // Update FPS counter every second
        fpsInterval = setInterval(updateFPS, 1000);
      }

      async function fetchLatestFrame() {
        try {
          // Get stream domain from URL parameter
          const urlParams = new URLSearchParams(window.location.search);
          const streamDomain = urlParams.get("stream") || "";

          // Production API URL
          let url = "/stream/latest";
          if (streamDomain) {
            url += `?stream=${encodeURIComponent(streamDomain)}`;
          }

          const response = await fetch(url);
          if (response.ok) {
            const data = await response.json();
            if (data.frame) {
              displayFrame(data.frame);
            }
          }
        } catch (error) {
          // Server not ready yet, keep trying
        }
      }

      function displayFrame(frame) {
        // Update status
        const status = document.getElementById("status");
        status.textContent = "🔴 LIVE";
        status.className = "status streaming";

        // Show frame - check multiple possible property names
        const gameFrame = document.getElementById("gameFrame");
        const placeholder = document.getElementById("placeholder");

        const visualData =
          frame.visualData ||
          frame.VisualData ||
          frame.visualDataBase64 ||
          frame.VisualDataBase64;

        if (visualData) {
          gameFrame.src = `data:image/jpeg;base64,${visualData}`;
          gameFrame.style.display = "block";
          placeholder.style.display = "none";
        } else {
          console.warn(
            "No visual data found in frame. Keys:",
            Object.keys(frame),
          );
        }

        // Update frame count (internal tracking)
        frameCount++;

        // Update FPS
        fpsCounter++;
        document.getElementById("fpsIndicator").style.display = "block";

        // Start session timer if not already started
        if (!sessionStartTime) {
          sessionStartTime = new Date();
        }
      }

      function updateFPS() {
        document.getElementById("fpsIndicator").textContent =
          `${fpsCounter} FPS`;
        fpsCounter = 0;
      }

      // Start connection
      connectToStream();
    </script>
  </body>
</html>
